catalogs:
  build:
    '@vitejs/plugin-vue': ^6.0.5
    puppeteer: ^24.40.0
    vite: npm:@voidzero-dev/vite-plus-core@latest
    vitest: npm:@voidzero-dev/vite-plus-test@latest
    vite-plus: latest
    '@cloudflare/vite-plugin': '^1.30.0'
    wrangler: '^4.76.0'
  frontend:
    '@iconify-json/carbon': ^1.2.19
    unocss: ^66.6.7
    vue: ^3.5.30
  types:
    '@types/node': ^24.12.0
    '@vue/tsconfig': ^0.9.0
    typescript: ~5.9.3

onlyBuiltDependencies:
  - esbuild
  - puppeteer
  - sharp
  - workerd

overrides:
  vite: 'catalog:build'
  vitest: 'catalog:build'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
